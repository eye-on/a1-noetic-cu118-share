services:
  simenv:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        UBUNTU_MIRROR: ${UBUNTU_MIRROR:-http://archive.ubuntu.com/ubuntu}
        UBUNTU_SECURITY_MIRROR: ${UBUNTU_SECURITY_MIRROR:-http://security.ubuntu.com/ubuntu}
        ROS_MIRROR: ${ROS_MIRROR:-http://packages.ros.org/ros/ubuntu}
    image: ${SIMENV_IMAGE:-simenv-a1-cu118-share:latest}
    container_name: ${SIMENV_CONTAINER:-simenv-a1-share}
    working_dir: /ws/SimEnv
    stdin_open: true
    tty: true
    volumes:
      - ./output/generated_building:/ws/SimEnv/generated_building
      - ./output/logs:/ws/SimEnv/logs
      - ./output/results:/ws/SimEnv/results
    command: bash
